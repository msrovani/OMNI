; ⚡ Omni-Box Co-Processor (ESP32-S3)
; Comunicação industrial em tempo real:
;   - Modbus RTU mestre (RS-485) → inversor
;   - CAN Bus 2.0 → BMS
;   - IEC 61850 SV (Sampled Values) → relés de proteção
;   - Watchdog + Safety (IEEE 1547)
; Comunica com o smartphone via USB CDC (Virtual COM Port)

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

lib_deps =
    ; CAN Bus
    https://github.com/sandeepmistry/arduino-CAN.git
    ; Modbus RTU
    emelianov/modbus-esp8266@^4.1.0
    ; USB CDC (no extra lib needed)
    ; IEC 61850 (custom, simplified)
    ; OTA (std Arduino libs — no extra dep)

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -mno-branch-likely
    -O2
    -DOTA_HOSTNAME=\"omni-box-esp32\"
    -DOTA_PORT=3232

; Firmware partition table for OTA
board_build.partitions = default_16MB.csv

; ─── Test Configuration ───
[env:test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
test_framework = unity
build_type = debug
lib_deps =
    https://github.com/sandeepmistry/arduino-CAN.git
    emelianov/modbus-esp8266@^4.1.0
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DBOARD_HAS_PSRAM
    -DUNIT_TEST
    -O0
    -g
