name: OMNI Grid CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC

env:
  NODE_VERSION: '22'
  RUST_VERSION: '1.83'

jobs:
  lint:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

  test-ts:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all TS tests
        run: npm test

  test-rust:
    name: Rust Tests (omni-box-fw)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Run Rust tests
        working-directory: crates/omni-box-fw
        run: cargo test

  test-android:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android unit tests
        working-directory: edge/android-app
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: edge/android-app/app/build/reports/tests/

  build-ts:
    name: Build TypeScript Packages
    runs-on: ubuntu-latest
    needs: [lint, test-ts]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

  build-rust:
    name: Build Rust Crate
    runs-on: ubuntu-latest
    needs: test-rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android

      - name: Install Android NDK target
        run: rustup target add aarch64-linux-android

      - name: Build omni-box-fw (host)
        working-directory: crates/omni-box-fw
        run: cargo build

      - name: Build JNI library (arm64-v8a)
        working-directory: crates/omni-box-fw
        run: |
          cargo ndk -t arm64-v8a -o ../../edge/android-app/app/src/main/jniLibs build --release
        continue-on-error: true

  build-esp32:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: |
          pip install platformio
          pio upgrade

      - name: Build ESP32 firmware
        working-directory: edge/esp-co-proc
        run: pio run

      - name: Run ESP32 tests
        working-directory: edge/esp-co-proc
        run: pio test -e test
        continue-on-error: true

      - name: Upload ESP32 firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: edge/esp-co-proc/.pio/build/esp32-s3-devkitc-1/*.bin

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Generate documentation site
        run: |
          mkdir -p _site
          cp AGENTS.md _site/
          cp OMNI_GRID_CONSPEC.md _site/
          cp LEARNED.md _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site

  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: [build-ts, build-rust, build-esp32]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Check build status
        run: |
          echo "Build concluído: ${{ needs.build-ts.result }}"
          echo "Rust: ${{ needs.build-rust.result }}"
          echo "ESP32: ${{ needs.build-esp32.result }}"
